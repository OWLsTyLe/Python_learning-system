<div class="auth-wrapper">
  <canvas class="code-bg" #codeCanvas></canvas>

  <nav class="navbar">
    <div class="logo"><span>>_</span>PyPath</div>
    <div class="nav-links">
      <a routerLink="/">Головна</a>
      <a routerLink="/courses">Курси</a>
    </div>
    <div class="navbar-right">
      <button class="theme-toggle" (click)="toggleTheme()" [title]="isDark ? 'Світла тема' : 'Темна тема'">
        @if (isDark) {
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        }
        @if (!isDark) {
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        }
      </button>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <div class="card-logo"><span>>_</span>PyPath</div>
      <h1>Увійти</h1>
      <p class="subtitle">Раді бачити тебе знову</p>

      @if (error) {
        <div class="error">{{ error }}</div>
      }

      <div class="field">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" placeholder="your@email.com">
      </div>

      <div class="field">
        <label>Пароль</label>
        <input type="password" [(ngModel)]="password" placeholder="••••••••">
      </div>

      <button class="btn-primary" (click)="onSubmit()">Увійти</button>

      <p class="switch">Немає акаунту? <a routerLink="/auth/register">Зареєструватись</a></p>
    </div>
  </div>
</div>
