<div class="auth-wrapper">
  <canvas class="code-bg" #codeCanvas></canvas>

  <nav class="navbar">
    <div class="logo"><span>>_</span>PyPath</div>
    <div class="nav-links">
      <a routerLink="/">Головна</a>
      <a routerLink="/courses">Курси</a>
    </div>
    <div class="navbar-right">
      <button class="theme-toggle" (click)="toggleTheme()" [title]="isDark ? 'Світла тема' : 'Темна тема'">
        @if (isDark) {
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        }
        @if (!isDark) {
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        }
      </button>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <div class="card-logo"><span>>_</span>PyPath</div>
      <h1>Увійти</h1>
      <p class="subtitle">Раді бачити тебе знову</p>

      @if (error) {
        <div class="error">{{ error }}</div>
      }

      <div class="field">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" placeholder="your@email.com">
      </div>

      <div class="field">
        <label>Пароль</label>
        <input type="password" [(ngModel)]="password" placeholder="••••••••">
      </div>

      <button class="btn-primary" (click)="onSubmit()">Увійти</button>

      <div class="divider"><span>або</span></div>

      <button class="btn-google" (click)="onGoogleLogin()">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Увійти через Google
      </button>

      <p class="switch">Немає акаунту? <a routerLink="/auth/register">Зареєструватись</a></p>
    </div>
  </div>
</div>
